services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: puri
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    ports:
      - "39291:8080"
    environment:
      APP_ENV: production
      JWT_SECRET: ${JWT_SECRET}
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/puri?sslmode=disable
      SUBMISSION_SERVICE_URL: http://submission:8081
      API_PORT: "8080"
    depends_on:
      - postgres
    restart: unless-stopped

  submission:
    build:
      context: .
      dockerfile: services/submission/Dockerfile
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/puri?sslmode=disable
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      SUBMISSION_PORT: "8081"
      PROBLEMS_PATH: /problems
      TESTCASES_PATH: /testcases
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp/puri-runs:/tmp/puri-runs
      - ./problems:/problems:ro
      - ./testcases:/testcases:ro
    depends_on:
      - postgres
      - rabbitmq
    restart: unless-stopped

volumes:
  postgres_data:
