version: v2

inputs:
  - directory: ./proto

plugins:
  - remote: buf.build/protocolbuffers/go:v1.36.11
    out: gen
    opt: paths=source_relative

  - remote: buf.build/connectrpc/go:v1.19.1
    out: gen
    opt:
      - paths=source_relative

  - remote: buf.build/bufbuild/es:v2.10.2
    out: web/src/gen
    opt: target=ts
    include_imports: true
