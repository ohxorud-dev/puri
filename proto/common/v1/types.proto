syntax = "proto3";
package puri.common.v1;
option go_package = "github.com/puri-cp/puri/gen/common/v1;commonv1";

enum Language {
  LANGUAGE_UNSPECIFIED = 0;
  LANGUAGE_CPP = 1;
  LANGUAGE_PYTHON = 2;
  LANGUAGE_JAVA = 3;
  LANGUAGE_GO = 4;
  LANGUAGE_JAVASCRIPT = 5;
  LANGUAGE_RUST = 6;
}

enum SubmissionStatus {
  SUBMISSION_STATUS_UNSPECIFIED = 0;
  SUBMISSION_STATUS_PENDING = 1;
  SUBMISSION_STATUS_JUDGING = 2;
  SUBMISSION_STATUS_ACCEPTED = 3;
  SUBMISSION_STATUS_WRONG_ANSWER = 4;
  SUBMISSION_STATUS_TIME_LIMIT_EXCEEDED = 5;
  SUBMISSION_STATUS_RUNTIME_ERROR = 6;
  SUBMISSION_STATUS_MEMORY_LIMIT_EXCEEDED = 7;
  SUBMISSION_STATUS_COMPILATION_ERROR = 8;
}
