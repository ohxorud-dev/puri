name: Snyk

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '53 8 * * 1'

permissions:
  contents: read
  security-events: write

jobs:
  snyk-node:
    name: Snyk (npm)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
      - uses: snyk/actions/setup@9adf32b1121593767fc3c057af55b55db032dc04 # master
      - name: Snyk test (all workspaces)
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: snyk test --all-projects --sarif-file-output=snyk-node.sarif
      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: snyk-node.sarif
          category: snyk-node

  snyk-go:
    name: Snyk (${{ matrix.module }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: [services/api, services/submission]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - uses: snyk/actions/setup@9adf32b1121593767fc3c057af55b55db032dc04 # master
      - name: Snyk test
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        working-directory: ${{ matrix.module }}
        run: snyk test --sarif-file-output=../../snyk-${{ strategy.job-index }}.sarif
      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: snyk-${{ strategy.job-index }}.sarif
          category: snyk-${{ matrix.module }}

  snyk-code:
    name: Snyk Code (SAST)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
      - uses: snyk/actions/setup@9adf32b1121593767fc3c057af55b55db032dc04 # master
      - name: Snyk Code test
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: snyk code test --sarif-file-output=snyk-code.sarif
      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: snyk-code.sarif
          category: snyk-code
