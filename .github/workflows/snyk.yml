name: Snyk

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '53 8 * * 1'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: read
  security-events: write

jobs:
  snyk-node:
    name: Snyk (npm)
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: false
      - name: Check token
        id: token
        run: echo "set=${{ secrets.SNYK_TOKEN != '' }}" >> "$GITHUB_OUTPUT"
      - if: steps.token.outputs.set == 'true'
        uses: snyk/actions/setup@9adf32b1121593767fc3c057af55b55db032dc04 # master
      - name: Snyk test (all workspaces)
        if: steps.token.outputs.set == 'true'
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: snyk test --all-projects --sarif-file-output=snyk-node.sarif || true
      - name: Upload SARIF
        if: steps.token.outputs.set == 'true' && hashFiles('snyk-node.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: snyk-node.sarif
          category: snyk-node

  snyk-go:
    name: Snyk (${{ matrix.module }})
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    strategy:
      fail-fast: false
      matrix:
        module: [services/api, services/submission]
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: false
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
      - name: Check token
        id: token
        run: echo "set=${{ secrets.SNYK_TOKEN != '' }}" >> "$GITHUB_OUTPUT"
      - if: steps.token.outputs.set == 'true'
        uses: snyk/actions/setup@9adf32b1121593767fc3c057af55b55db032dc04 # master
      - name: Snyk test
        if: steps.token.outputs.set == 'true'
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        working-directory: ${{ matrix.module }}
        run: snyk test --sarif-file-output=../../snyk-${{ strategy.job-index }}.sarif || true
      - name: Upload SARIF
        if: steps.token.outputs.set == 'true' && hashFiles(format('snyk-{0}.sarif', strategy.job-index)) != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: snyk-${{ strategy.job-index }}.sarif
          category: snyk-${{ matrix.module }}

  snyk-code:
    name: Snyk Code (SAST)
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: false
      - name: Check token
        id: token
        run: echo "set=${{ secrets.SNYK_TOKEN != '' }}" >> "$GITHUB_OUTPUT"
      - if: steps.token.outputs.set == 'true'
        uses: snyk/actions/setup@9adf32b1121593767fc3c057af55b55db032dc04 # master
      - name: Snyk Code test
        if: steps.token.outputs.set == 'true'
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: snyk code test --sarif-file-output=snyk-code.sarif || true
      - name: Upload SARIF
        if: steps.token.outputs.set == 'true' && hashFiles('snyk-code.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: snyk-code.sarif
          category: snyk-code
