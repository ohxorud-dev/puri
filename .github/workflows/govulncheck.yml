name: govulncheck

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '37 8 * * 1'

jobs:
  scan:
    name: Scan ${{ matrix.module }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: [services/api, services/submission]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Run govulncheck
        uses: golang/govulncheck-action@v1
        with:
          go-version-input: '1.25'
          work-dir: ${{ matrix.module }}
