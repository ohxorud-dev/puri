name: Deploy API

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'services/api/**'
      - 'gen/**'
      - 'db/**'
      - 'go.mod'
      - 'go.sum'
      - 'docker-compose.prod.yml'
      - '.github/workflows/deploy-api.yml'

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/puri-api

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_ref: ${{ steps.meta.outputs.image_ref }}
    steps:
      - name: Checkout (no submodules)
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image ref
        id: meta
        run: echo "image_ref=${IMAGE}:${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: services/api/Dockerfile
          push: true
          provenance: false
          sbom: false
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ steps.meta.outputs.image_ref }}
          cache-from: type=registry,ref=${{ env.IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE }}:buildcache,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1
        env:
          IMAGE_REF: ${{ needs.build.outputs.image_ref }}
        with:
          host: ${{ vars.SSH_HOST }}
          username: ${{ vars.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: IMAGE_REF
          script: |
            set -e

            command -v git &> /dev/null || sudo yum install -y git

            if ! sudo docker compose version &> /dev/null; then
              COMPOSE_URL="https://github.com/docker/compose/releases/latest/download/docker-compose-$(uname -s)-$(uname -m)"
              sudo mkdir -p /usr/libexec/docker/cli-plugins
              sudo curl -SL "$COMPOSE_URL" -o /usr/libexec/docker/cli-plugins/docker-compose
              sudo chmod +x /usr/libexec/docker/cli-plugins/docker-compose
            fi

            git config --global url."https://${{ secrets.GH_PAT }}@github.com/".insteadOf "https://github.com/"
            REPO_URL="https://${{ secrets.GH_PAT }}@github.com/ohxorud-dev/puri.git"
            if [ ! -d ~/puri ]; then
              git clone --recurse-submodules "$REPO_URL" ~/puri
            else
              cd ~/puri
              git remote set-url origin "$REPO_URL"
              git fetch origin
              git reset --hard origin/main
              git submodule sync --recursive
              git submodule update --init --recursive
            fi

            cd ~/puri

            echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" > .env

            sudo docker pull "$IMAGE_REF"
            sudo docker tag "$IMAGE_REF" ghcr.io/ohxorud-dev/puri-api:latest

            sudo docker compose -f docker-compose.prod.yml up -d --no-build api
            sudo docker image prune -f

  cleanup:
    needs: deploy
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Cleanup old package versions
        uses: dataaxiom/ghcr-cleanup-action@cd0cdb900b5dbf3a6f2cc869f0dbb0b8211f50c4 # v1
        with:
          package: puri-api
          keep-n-tagged: 1
          delete-untagged: true
          exclude-tags: buildcache
